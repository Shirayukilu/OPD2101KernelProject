name: 编译内核(ColorOS/SM8250)

on:
  workflow_dispatch:
    inputs:
      proprietary_repo:
        description: '闭源驱动仓库地址'
        required: true
        default: 'https://github.com/Shirayukilu/Devicetree_oppo_sm8250_opd2101'
      proprietary_branch:
        description: '闭源驱动仓库分支'
        required: true
        default: 'ooppo/sm8250_t_13.0.0_oppopad'
      kernel_repo:
        description: '内核源码仓库地址'
        required: true
        default: 'https://github.com/Shirayukilu/android_kernel_oppo_sm8250'
      kernel_branch:
        description: '内核源码仓库分支'
        required: true
        default: 'lineage-23.0'
      defconfig:
        description: '配置文件名称'
        required: true
        default: 'gki_defconfig'
      # 新增选项
      include_ksu:
        description: '是否集成 KernelSU'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      include_susfs:
        description: '是否集成 SusFS (需要先开启KernelSU)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      custom_version_name:
        description: '自定义内核版本号 (例如: v1.0-KSU)'
        required: false
        default: 'SM8250-Stock'
      include_build_date:
        description: '是否在版本号中加入编译日期'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖库
        run: |
          sudo apt update
          sudo apt install -y build-essential libssl-dev bc flex bison git zip unzip curl wget tar xz-utils cpio rsync lzop xz-utils zstd libncurses-dev libffi-dev libbz2-dev llvm clang lld dwarves libelf-dev

      - name: 将swap设置为15GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 15

      - name: 克隆闭源驱动仓库
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.proprietary_branch }} \
            ${{ github.event.inputs.proprietary_repo }} proprietary_drivers

      - name: 克隆内核源码仓库
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.kernel_branch }} \
            ${{ github.event.inputs.kernel_repo }} kernel_source

      - name: 构建标准编译目录
        run: |
          sudo mkdir -p /kernel/common
          sudo mv kernel_source/* /kernel/common/
          if [ -d "proprietary_drivers/vendor" ]; then
            sudo cp -r proprietary_drivers/vendor /
          fi
          sudo rm -rf kernel_source proprietary_drivers

      - name: 集成 KernelSU (如果开启)
        if: ${{ github.event.inputs.include_ksu == 'true' }}
        run: |
          cd /kernel/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: 集成 SusFS (如果开启)
        if: ${{ github.event.inputs.include_susfs == 'true' && github.event.inputs.include_ksu == 'true' }}
        run: |
          cd /kernel/common
          git clone --depth=1 https://github.com/5ec1cff/KernelSU_SusFS.git susfs
          cp -r susfs/kernel/* .
          rm -rf susfs

      - name: 配置自定义版本号
        run: |
          cd /kernel/common
          VERSION="${{ github.event.inputs.custom_version_name }}"
          if [ "${{ github.event.inputs.include_build_date }}" = "true" ]; then
            BUILD_DATE=$(date +%Y%m%d)
            VERSION="${VERSION}-${BUILD_DATE}"
          fi
          echo "CONFIG_LOCALVERSION=\"-${VERSION}\"" >> arch/arm64/configs/${{ github.event.inputs.defconfig }}
          echo "内核版本号将被设置为: ${VERSION}"

      - name: 编译内核
        run: |
          sudo chown -R $USER:$USER /kernel
          cd /kernel/common
          make ARCH=arm64 LLVM=1 O=out ${{ github.event.inputs.defconfig }}
          make ARCH=arm64 LLVM=1 O=out -j$(nproc --all)

      - name: 上传内核文件
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-${{ github.event.inputs.custom_version_name }}
          path: |
            /kernel/common/out/arch/arm64/boot/Image.gz
            /kernel/common/out/arch/arm64/boot/Image

      - name: 打包成AnyKernel3压缩包
        run: |
          echo "Cloning AnyKernel3..."
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3

          echo "Copying kernel image..."
          cp /kernel/common/out/arch/arm64/boot/Image.gz AK3/

          echo "Setting up anykernel.sh..."
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' AK3/anykernel.sh
          sed -i 's/do.modules=0/do.modules=1/' AK3/anykernel.sh

          VERSION="${{ github.event.inputs.custom_version_name }}"
          if [ "${{ github.event.inputs.include_build_date }}" = "true" ]; then
            BUILD_DATE=$(date +%Y%m%d)
            VERSION="${VERSION}-${BUILD_DATE}"
          fi

          echo "Zipping..."
          cd AK3
          zip -r9 ../Kernel-${VERSION}.zip *
          cd ..

      - name: 上传AnyKernel3压缩包
        uses: actions/upload-artifact@v4
        with:
         name: kernel-anykernel3-${{ github.event.inputs.custom_version_name }}
         path: Kernel-*.zip
